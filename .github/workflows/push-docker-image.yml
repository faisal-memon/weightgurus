name: Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ secrets.GHCR_USERNAME }}
        password: ${{ secrets.GHCR_TOKEN }}
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image (semantic version)
      run: |
        docker build -t ghcr.io/faisalmemon/weightgurus:${{ env.VERSION }} .
        docker push ghcr.io/faisalmemon/weightgurus:${{ env.VERSION }}

    - name: Build and push Docker image (latest)
      run: |
        docker build -t ghcr.io/faisalmemon/weightgurus:latest .
        docker push ghcr.io/faisalmemon/weightgurus:latest
      run: |
        docker build -t yourusername/yourimagename:latest .
        docker push yourusername/yourimagename:latest

    - name: Build and push Docker image (commit SHA)
      run: |
        docker build -t yourusername/yourimagename:${{ github.sha }} .
        docker push yourusername/yourimagename:${{ github.sha }}